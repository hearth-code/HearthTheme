name: Theme Audit

on:
  pull_request:
    branches:
      - main
    paths:
      - 'themes/**'
      - 'src/**'
      - 'public/**'
      - 'docs/theme-baseline.md'
      - 'extension/package.json'
      - 'scripts/**'
      - '.husky/**'
      - 'fixtures/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'astro.config.mjs'
      - '.github/workflows/theme-audit.yml'

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify sync output is committed
        run: pnpm run check:sync

      - name: Run audits
        run: pnpm run audit:all

      - name: Build site
        run: pnpm run build
