name: Theme Audit

on:
  pull_request:
    branches:
      - main
    paths:
      - 'themes/**'
      - 'src/**'
      - 'public/**'
      - 'docs/theme-baseline.md'
      - 'docs/color-language-spec.md'
      - 'docs/color-language-report.md'
      - 'reports/**'
      - 'extension/package.json'
      - 'scripts/**'
      - '.husky/**'
      - 'fixtures/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'astro.config.mjs'
      - '.github/workflows/theme-audit.yml'
      - '.github/CODEOWNERS'
      - '.github/pull_request_template.md'

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify sync output is committed
        run: pnpm run check:sync

      - name: Audit generated output source-of-truth linkage
        run: pnpm run audit:generated-origin -- --base-ref "${{ github.base_ref }}"

      - name: Run audits
        run: pnpm run audit:all

      - name: Build site
        run: pnpm run build

      - name: Generate color-language consistency report
        run: pnpm run generate:color-report

      - name: Package extension smoke test
        working-directory: extension
        run: pnpm dlx @vscode/vsce package --no-dependencies --out hearth-theme-pr.vsix

      - name: Upload color-language report artifact
        uses: actions/upload-artifact@v4
        with:
          name: hearth-color-language-report
          path: |
            docs/color-language-report.md
            reports/color-language-consistency.json
          if-no-files-found: error
          retention-days: 7

      - name: Upload extension smoke artifact
        uses: actions/upload-artifact@v4
        with:
          name: hearth-theme-pr-vsix
          path: extension/hearth-theme-pr.vsix
          if-no-files-found: error
          retention-days: 7
