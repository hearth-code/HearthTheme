name: Main Release Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify sync output is committed
        run: pnpm run check:sync

      - name: Run audits
        run: pnpm run audit:all

      - name: Build site
        run: pnpm run build

  publish-marketplace:
    runs-on: ubuntu-latest
    needs: verify
    env:
      VSCE_PAT: ${{ secrets.VSCE_PAT }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install root dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync themes
        run: node scripts/sync-themes.mjs

      - name: Generate preview images
        run: pnpm run preview:generate

      - name: Install extension dependencies
        working-directory: extension
        run: pnpm install --frozen-lockfile

      - name: Detect extension payload changes
        id: extension_diff
        uses: actions/github-script@v8
        env:
          BEFORE_SHA: ${{ github.event.before }}
          CURRENT_SHA: ${{ github.sha }}
        with:
          script: |
            const { execSync } = require('node:child_process')
            const before = process.env.BEFORE_SHA
            const current = process.env.CURRENT_SHA

            if (context.eventName !== 'push' || !before || /^0+$/.test(before)) {
              core.info('Non-push event or missing previous SHA. Skip strict extension diff.')
              core.setOutput('changed', 'false')
              return
            }

            let files = []
            try {
              const raw = execSync(`git diff --name-only ${before} ${current}`, { encoding: 'utf8' })
              files = raw.split('\n').map((s) => s.trim()).filter(Boolean)
            } catch (error) {
              core.warning(`Unable to diff commits (${error.message}).`)
              core.setOutput('changed', 'false')
              return
            }

            const requiresPublishPrefixes = ['extension/themes/']
            const requiresPublishFiles = new Set([
              'extension/package.json',
              'extension/CHANGELOG.md',
              'extension/icon.png',
            ])
            const docsOnlyPrefixes = ['extension/images/']
            const docsOnlyFiles = new Set([
              'extension/README.md',
            ])

            const requiresPublish = files.some((file) =>
              requiresPublishFiles.has(file) || requiresPublishPrefixes.some((prefix) => file.startsWith(prefix)),
            )
            const docsOnly = files.some((file) =>
              docsOnlyFiles.has(file) || docsOnlyPrefixes.some((prefix) => file.startsWith(prefix)),
            )
            const changed = requiresPublish || docsOnly

            core.info(`Extension payload changed: ${changed}`)
            core.info(`Requires extension publish: ${requiresPublish}`)
            core.info(`Docs/image-only changes: ${docsOnly && !requiresPublish}`)
            core.setOutput('changed', changed ? 'true' : 'false')
            core.setOutput('requires_publish', requiresPublish ? 'true' : 'false')
            core.setOutput('docs_only', docsOnly && !requiresPublish ? 'true' : 'false')

      - name: Check Marketplace latest version
        id: marketplace
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('node:fs')
            const path = require('node:path')

            const pkgPath = path.join(process.env.GITHUB_WORKSPACE, 'extension', 'package.json')
            const pkg = JSON.parse(fs.readFileSync(pkgPath, 'utf8'))
            const publisher = pkg.publisher
            const extensionName = pkg.name
            const localVersion = pkg.version

            core.info(`Local extension: ${publisher}.${extensionName} v${localVersion}`)

            const payload = {
              filters: [
                {
                  criteria: [
                    { filterType: 7, value: `${publisher}.${extensionName}` }
                  ],
                  pageNumber: 1,
                  pageSize: 1,
                  sortBy: 0,
                  sortOrder: 0
                }
              ],
              flags: 103
            }

            try {
              const response = await fetch('https://marketplace.visualstudio.com/_apis/public/gallery/extensionquery', {
                method: 'POST',
                headers: {
                  'Content-Type': 'application/json',
                  'Accept': 'application/json;api-version=7.1-preview.1;excludeUrls=true'
                },
                body: JSON.stringify(payload),
              })

              if (!response.ok) {
                throw new Error(`HTTP ${response.status}`)
              }

              const data = await response.json()
              const remoteVersion = data?.results?.[0]?.extensions?.[0]?.versions?.[0]?.version ?? null

              if (!remoteVersion) {
                core.warning('Marketplace version not found. Publish step will run.')
                core.setOutput('should_publish', 'true')
                return
              }

              core.info(`Marketplace latest version: ${remoteVersion}`)
              if (remoteVersion === localVersion) {
                core.notice('Marketplace already has this version. Publish step will be skipped.')
                core.setOutput('should_publish', 'false')
                return
              }

              core.setOutput('should_publish', 'true')
            } catch (error) {
              core.warning(`Failed to query Marketplace (${error.message}). Publish step will still run.`)
              core.setOutput('should_publish', 'true')
            }

      - name: Enforce version bump for extension release payload changes
        if: ${{ env.VSCE_PAT != '' && steps.extension_diff.outputs.requires_publish == 'true' && steps.marketplace.outputs.should_publish != 'true' }}
        run: |
          echo "Release payload changed (theme/package/changelog/icon), but Marketplace already has this version."
          echo "Please bump extension/package.json version before publishing."
          exit 1

      - name: Skip publish (docs/image-only changes with existing version)
        if: ${{ env.VSCE_PAT != '' && steps.extension_diff.outputs.docs_only == 'true' && steps.marketplace.outputs.should_publish != 'true' }}
        run: |
          echo "Only README/images changed under extension."
          echo "Marketplace publish is skipped because this version already exists."

      - name: Skip publish (no VSCE token)
        if: ${{ env.VSCE_PAT == '' }}
        run: echo "VSCE_PAT is missing. Skipping VS Marketplace publish."

      - name: Skip publish (version already exists)
        if: ${{ env.VSCE_PAT != '' && steps.marketplace.outputs.should_publish != 'true' }}
        run: echo "Version already exists on Marketplace. Skipping publish."

      - name: Publish to VS Marketplace
        if: ${{ env.VSCE_PAT != '' && steps.marketplace.outputs.should_publish == 'true' }}
        working-directory: extension
        run: >
          pnpm vsce publish --no-dependencies --skip-duplicate
          --baseContentUrl "https://github.com/${{ github.repository }}/blob/${{ github.ref_name }}/extension"
          --baseImagesUrl "https://raw.githubusercontent.com/${{ github.repository }}/${{ github.ref_name }}/extension"

  publish-openvsx:
    runs-on: ubuntu-latest
    needs: verify
    env:
      OVSX_PAT: ${{ secrets.OVSX_PAT }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install root dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync themes
        run: node scripts/sync-themes.mjs

      - name: Generate preview images
        run: pnpm run preview:generate

      - name: Install extension dependencies
        working-directory: extension
        run: pnpm install --frozen-lockfile

      - name: Detect extension payload changes
        id: extension_diff
        uses: actions/github-script@v8
        env:
          BEFORE_SHA: ${{ github.event.before }}
          CURRENT_SHA: ${{ github.sha }}
        with:
          script: |
            const { execSync } = require('node:child_process')
            const before = process.env.BEFORE_SHA
            const current = process.env.CURRENT_SHA

            if (context.eventName !== 'push' || !before || /^0+$/.test(before)) {
              core.info('Non-push event or missing previous SHA. Skip strict extension diff.')
              core.setOutput('changed', 'false')
              return
            }

            let files = []
            try {
              const raw = execSync(`git diff --name-only ${before} ${current}`, { encoding: 'utf8' })
              files = raw.split('\n').map((s) => s.trim()).filter(Boolean)
            } catch (error) {
              core.warning(`Unable to diff commits (${error.message}).`)
              core.setOutput('changed', 'false')
              return
            }

            const requiresPublishPrefixes = ['extension/themes/']
            const requiresPublishFiles = new Set([
              'extension/package.json',
              'extension/CHANGELOG.md',
              'extension/icon.png',
            ])
            const docsOnlyPrefixes = ['extension/images/']
            const docsOnlyFiles = new Set([
              'extension/README.md',
            ])

            const requiresPublish = files.some((file) =>
              requiresPublishFiles.has(file) || requiresPublishPrefixes.some((prefix) => file.startsWith(prefix)),
            )
            const docsOnly = files.some((file) =>
              docsOnlyFiles.has(file) || docsOnlyPrefixes.some((prefix) => file.startsWith(prefix)),
            )
            const changed = requiresPublish || docsOnly

            core.info(`Extension payload changed: ${changed}`)
            core.info(`Requires extension publish: ${requiresPublish}`)
            core.info(`Docs/image-only changes: ${docsOnly && !requiresPublish}`)
            core.setOutput('changed', changed ? 'true' : 'false')
            core.setOutput('requires_publish', requiresPublish ? 'true' : 'false')
            core.setOutput('docs_only', docsOnly && !requiresPublish ? 'true' : 'false')

      - name: Check Open VSX latest version
        id: openvsx
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('node:fs')
            const path = require('node:path')

            const pkgPath = path.join(process.env.GITHUB_WORKSPACE, 'extension', 'package.json')
            const pkg = JSON.parse(fs.readFileSync(pkgPath, 'utf8'))
            const publisher = pkg.publisher
            const extensionName = pkg.name
            const localVersion = pkg.version
            const endpoint = `https://open-vsx.org/api/${publisher}/${extensionName}/latest`

            core.info(`Local extension: ${publisher}.${extensionName} v${localVersion}`)

            try {
              const response = await fetch(endpoint)
              if (response.status === 404) {
                core.notice('Open VSX entry not found yet. Publish step will run.')
                core.setOutput('should_publish', 'true')
                return
              }
              if (!response.ok) {
                throw new Error(`HTTP ${response.status}`)
              }

              const data = await response.json()
              const remoteVersion = data?.version ?? null
              if (!remoteVersion) {
                core.warning('Open VSX version not found in response. Publish step will run.')
                core.setOutput('should_publish', 'true')
                return
              }

              core.info(`Open VSX latest version: ${remoteVersion}`)
              if (remoteVersion === localVersion) {
                core.notice('Open VSX already has this version. Publish step will be skipped.')
                core.setOutput('should_publish', 'false')
                return
              }

              core.setOutput('should_publish', 'true')
            } catch (error) {
              core.warning(`Failed to query Open VSX (${error.message}). Publish step will still run.`)
              core.setOutput('should_publish', 'true')
            }

      - name: Enforce version bump for extension release payload changes
        if: ${{ env.OVSX_PAT != '' && steps.extension_diff.outputs.requires_publish == 'true' && steps.openvsx.outputs.should_publish != 'true' }}
        run: |
          echo "Release payload changed (theme/package/changelog/icon), but Open VSX already has this version."
          echo "Please bump extension/package.json version before publishing."
          exit 1

      - name: Skip publish (docs/image-only changes with existing version)
        if: ${{ env.OVSX_PAT != '' && steps.extension_diff.outputs.docs_only == 'true' && steps.openvsx.outputs.should_publish != 'true' }}
        run: |
          echo "Only README/images changed under extension."
          echo "Open VSX publish is skipped because this version already exists."

      - name: Skip publish (no Open VSX token)
        if: ${{ env.OVSX_PAT == '' }}
        run: echo "OVSX_PAT is missing. Skipping Open VSX publish."

      - name: Skip publish (version already exists)
        if: ${{ env.OVSX_PAT != '' && steps.openvsx.outputs.should_publish != 'true' }}
        run: echo "Version already exists on Open VSX. Skipping publish."

      - name: Ensure Open VSX namespace (first publish bootstrap)
        if: ${{ env.OVSX_PAT != '' && steps.openvsx.outputs.should_publish == 'true' }}
        working-directory: extension
        continue-on-error: true
        run: |
          NAMESPACE=$(node -e "const p=require('./package.json'); process.stdout.write(p.publisher)")
          pnpm dlx ovsx create-namespace "$NAMESPACE" -p "$OVSX_PAT"

      - name: Publish to Open VSX
        if: ${{ env.OVSX_PAT != '' && steps.openvsx.outputs.should_publish == 'true' }}
        working-directory: extension
        run: >
          pnpm dlx ovsx publish --no-dependencies --skip-duplicate
          --baseContentUrl "https://github.com/${{ github.repository }}/blob/${{ github.ref_name }}/extension"
          --baseImagesUrl "https://raw.githubusercontent.com/${{ github.repository }}/${{ github.ref_name }}/extension"
          -p "${OVSX_PAT}"

  release-github:
    runs-on: ubuntu-latest
    needs:
      - verify
      - publish-marketplace
      - publish-openvsx
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Detect extension version change
        id: ext_version
        uses: actions/github-script@v8
        env:
          BEFORE_SHA: ${{ github.event.before }}
          CURRENT_SHA: ${{ github.sha }}
        with:
          script: |
            const { execSync } = require('node:child_process')
            const fs = require('node:fs')
            const path = require('node:path')
            const before = process.env.BEFORE_SHA
            const current = process.env.CURRENT_SHA

            const pkgPath = path.join(process.env.GITHUB_WORKSPACE, 'extension', 'package.json')
            const pkg = JSON.parse(fs.readFileSync(pkgPath, 'utf8'))
            const version = String(pkg.version || '').trim()
            const tag = `v${version}`
            core.setOutput('version', version)
            core.setOutput('tag', tag)

            if (context.eventName !== 'push' || !before || /^0+$/.test(before)) {
              core.notice('Skip release creation on non-push events or missing before SHA.')
              core.setOutput('changed', 'false')
              return
            }

            let files = []
            try {
              const raw = execSync(`git diff --name-only ${before} ${current}`, { encoding: 'utf8' })
              files = raw.split('\n').map((s) => s.trim()).filter(Boolean)
            } catch (error) {
              core.warning(`Unable to diff commits (${error.message}).`)
              core.setOutput('changed', 'false')
              return
            }

            const changed = files.includes('extension/package.json') || files.includes('extension/CHANGELOG.md')
            core.setOutput('changed', changed ? 'true' : 'false')

      - name: Create GitHub release from extension changelog
        if: ${{ steps.ext_version.outputs.changed == 'true' }}
        uses: actions/github-script@v8
        env:
          VERSION: ${{ steps.ext_version.outputs.version }}
          TAG: ${{ steps.ext_version.outputs.tag }}
        with:
          script: |
            const fs = require('node:fs')
            const path = require('node:path')

            const version = process.env.VERSION
            const tag = process.env.TAG
            const { owner, repo } = context.repo

            try {
              await github.rest.repos.getReleaseByTag({ owner, repo, tag })
              core.notice(`Release ${tag} already exists. Skipping creation.`)
              return
            } catch (error) {
              if (error.status !== 404) throw error
            }

            const changelogPath = path.join(process.env.GITHUB_WORKSPACE, 'extension', 'CHANGELOG.md')
            const changelog = fs.readFileSync(changelogPath, 'utf8')
            const escape = (s) => s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')
            const sectionRe = new RegExp(`^##\\s+${escape(version)}\\s*\\n([\\s\\S]*?)(?=\\n##\\s+\\d+\\.\\d+\\.\\d+|$)`, 'm')
            const match = changelog.match(sectionRe)
            const body = (match?.[1] ?? `Release ${version}`).trim()

            await github.rest.repos.createRelease({
              owner,
              repo,
              tag_name: tag,
              target_commitish: context.sha,
              name: `HearthCode Extension ${tag}`,
              body,
              draft: false,
              prerelease: false,
            })

            core.info(`Created release ${tag}`)
