name: Main Release Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      PAGES_ENABLEMENT_TOKEN: ${{ secrets.PAGES_ENABLEMENT_TOKEN }}
    outputs:
      pages_ready: ${{ steps.pages_ready.outputs.ready }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run audits
        run: pnpm run audit:all

      - name: Build site
        run: pnpm run build

      - name: Check Pages status
        id: pages_status
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo
            try {
              await github.request('GET /repos/{owner}/{repo}/pages', { owner, repo })
              core.info('GitHub Pages is enabled.')
              core.setOutput('enabled', 'true')
            } catch (error) {
              if (error.status === 404) {
                core.warning('GitHub Pages is not enabled for this repository.')
                core.setOutput('enabled', 'false')
              } else {
                throw error
              }
            }

      - name: Try enabling Pages (optional)
        if: ${{ steps.pages_status.outputs.enabled == 'false' && env.PAGES_ENABLEMENT_TOKEN != '' }}
        continue-on-error: true
        uses: actions/configure-pages@v5
        with:
          token: ${{ env.PAGES_ENABLEMENT_TOKEN }}
          enablement: true

      - name: Re-check Pages status
        id: pages_status_after
        if: ${{ steps.pages_status.outputs.enabled == 'false' }}
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo
            try {
              await github.request('GET /repos/{owner}/{repo}/pages', { owner, repo })
              core.setOutput('enabled', 'true')
            } catch (error) {
              if (error.status === 404) {
                core.setOutput('enabled', 'false')
              } else {
                throw error
              }
            }

      - name: Decide Pages readiness
        id: pages_ready
        uses: actions/github-script@v7
        env:
          PAGES_BEFORE: ${{ steps.pages_status.outputs.enabled }}
          PAGES_AFTER: ${{ steps.pages_status_after.outputs.enabled }}
        with:
          script: |
            const before = process.env.PAGES_BEFORE === 'true'
            const after = process.env.PAGES_AFTER === 'true'
            const ready = before || after
            if (!ready) {
              core.warning('Skipping Pages deploy. Enable Pages (Settings > Pages, Source: GitHub Actions) or provide PAGES_ENABLEMENT_TOKEN.')
            }
            core.setOutput('ready', ready ? 'true' : 'false')

      - name: Setup Pages
        if: ${{ steps.pages_ready.outputs.ready == 'true' }}
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: ${{ steps.pages_ready.outputs.ready == 'true' }}
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy-site:
    runs-on: ubuntu-latest
    needs: verify
    if: ${{ needs.verify.outputs.pages_ready == 'true' }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  publish-marketplace:
    runs-on: ubuntu-latest
    needs: verify
    env:
      VSCE_PAT: ${{ secrets.VSCE_PAT }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install root dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync themes
        run: node scripts/sync-themes.mjs

      - name: Generate preview images
        run: pnpm run preview:generate

      - name: Install extension dependencies
        working-directory: extension
        run: pnpm install --frozen-lockfile

      - name: Detect extension payload changes
        id: extension_diff
        uses: actions/github-script@v7
        env:
          BEFORE_SHA: ${{ github.event.before }}
          CURRENT_SHA: ${{ github.sha }}
        with:
          script: |
            const { execSync } = require('node:child_process')
            const before = process.env.BEFORE_SHA
            const current = process.env.CURRENT_SHA

            if (context.eventName !== 'push' || !before || /^0+$/.test(before)) {
              core.info('Non-push event or missing previous SHA. Skip strict extension diff.')
              core.setOutput('changed', 'false')
              return
            }

            let files = []
            try {
              const raw = execSync(`git diff --name-only ${before} ${current}`, { encoding: 'utf8' })
              files = raw.split('\n').map((s) => s.trim()).filter(Boolean)
            } catch (error) {
              core.warning(`Unable to diff commits (${error.message}).`)
              core.setOutput('changed', 'false')
              return
            }

            const watchPrefixes = ['extension/themes/', 'extension/images/']
            const watchFiles = new Set([
              'extension/package.json',
              'extension/README.md',
              'extension/CHANGELOG.md',
              'extension/icon.png',
            ])

            const changed = files.some((file) =>
              watchFiles.has(file) || watchPrefixes.some((prefix) => file.startsWith(prefix)),
            )

            core.info(`Extension payload changed: ${changed}`)
            core.setOutput('changed', changed ? 'true' : 'false')

      - name: Check Marketplace latest version
        id: marketplace
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('node:fs')
            const path = require('node:path')

            const pkgPath = path.join(process.env.GITHUB_WORKSPACE, 'extension', 'package.json')
            const pkg = JSON.parse(fs.readFileSync(pkgPath, 'utf8'))
            const publisher = pkg.publisher
            const extensionName = pkg.name
            const localVersion = pkg.version

            core.info(`Local extension: ${publisher}.${extensionName} v${localVersion}`)

            const payload = {
              filters: [
                {
                  criteria: [
                    { filterType: 7, value: publisher },
                    { filterType: 8, value: extensionName }
                  ],
                  pageNumber: 1,
                  pageSize: 1,
                  sortBy: 0,
                  sortOrder: 0
                }
              ],
              flags: 103
            }

            try {
              const response = await fetch('https://marketplace.visualstudio.com/_apis/public/gallery/extensionquery', {
                method: 'POST',
                headers: {
                  'Content-Type': 'application/json',
                  'Accept': 'application/json;api-version=7.1-preview.1;excludeUrls=true'
                },
                body: JSON.stringify(payload),
              })

              if (!response.ok) {
                throw new Error(`HTTP ${response.status}`)
              }

              const data = await response.json()
              const remoteVersion = data?.results?.[0]?.extensions?.[0]?.versions?.[0]?.version ?? null

              if (!remoteVersion) {
                core.warning('Marketplace version not found. Publish step will run.')
                core.setOutput('should_publish', 'true')
                return
              }

              core.info(`Marketplace latest version: ${remoteVersion}`)
              if (remoteVersion === localVersion) {
                core.notice('Marketplace already has this version. Publish step will be skipped.')
                core.setOutput('should_publish', 'false')
                return
              }

              core.setOutput('should_publish', 'true')
            } catch (error) {
              core.warning(`Failed to query Marketplace (${error.message}). Publish step will still run.`)
              core.setOutput('should_publish', 'true')
            }

      - name: Enforce version bump for extension changes
        if: ${{ env.VSCE_PAT != '' && steps.extension_diff.outputs.changed == 'true' && steps.marketplace.outputs.should_publish != 'true' }}
        run: |
          echo "Extension payload changed, but Marketplace already has this version."
          echo "Please bump extension/package.json version before publishing."
          exit 1

      - name: Skip publish (no VSCE token)
        if: ${{ env.VSCE_PAT == '' }}
        run: echo "VSCE_PAT is missing. Skipping VS Marketplace publish."

      - name: Skip publish (version already exists)
        if: ${{ env.VSCE_PAT != '' && steps.marketplace.outputs.should_publish != 'true' }}
        run: echo "Version already exists on Marketplace. Skipping publish."

      - name: Publish to VS Marketplace
        if: ${{ env.VSCE_PAT != '' && steps.marketplace.outputs.should_publish == 'true' }}
        working-directory: extension
        run: >
          pnpm vsce publish --no-dependencies --skip-license
          --baseContentUrl "https://github.com/${{ github.repository }}/blob/${{ github.ref_name }}/extension"
          --baseImagesUrl "https://raw.githubusercontent.com/${{ github.repository }}/${{ github.ref_name }}/extension"
